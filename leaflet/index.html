  <!-- Leaflet Routing Machine -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .label {
      background: white;
      border: 1px solid #666;
      border-radius: 4px;
      padding: 2px 4px;
      font-size: 12px;
      box-shadow: none;
    }

    .panel {
      position: absolute;
      z-index: 1000;
      top: 10px;
      left: 10px;
      background: white;
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      width: 240px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .panel select,
    .panel button {
      width: 100%;
      margin-bottom: 8px;
      padding: 6px;
      font-size: 14px;
    }
  </style>
</head>

  <button id="currentBtn">現在地を出発地にする</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

//////////////////////////////////////////////////////

//////////////////////////////////////////////////////

  'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',

    attribution: "地理院地図"

const pale = L.tileLayer(
  'https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png',

    attribution: "地理院地図"

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    attribution: "OpenStreetMap"
  }
);

L.control.layers({
  "地理院地図": gsi,
  "淡色地図": pale,
  "OSM": osm

L.control.scale({
  imperial: false
}).addTo(map);

//////////////////////////////////////////////////////
// マーカー追加
//////////////////////////////////////////////////////

const startSelect = document.getElementById("startSelect");
const goalSelect = document.getElementById("goalSelect");

buildings.forEach((b, index) => {

  // マーカー
  L.marker(b.latlng)
    .addTo(map)
    .bindTooltip(b.name, {
      permanent: true,
      direction: "top",
      offset: [0, -10],
      className: "label"
    });

  // select追加
  const option1 = document.createElement("option");
  option1.value = index;
  option1.textContent = b.name;

  const option2 = document.createElement("option");
  option2.value = index;
  option2.textContent = b.name;

  startSelect.appendChild(option1);
  goalSelect.appendChild(option2);
});

//////////////////////////////////////////////////////
// routing control
//////////////////////////////////////////////////////

let routingControl = null;

function createRoute(startLatLng, goalLatLng) {

  if (routingControl) {
    map.removeControl(routingControl);
  }

  routingControl = L.Routing.control({

    waypoints: [
      L.latLng(startLatLng[0], startLatLng[1]),
      L.latLng(goalLatLng[0], goalLatLng[1])
    ],

    routeWhileDragging: false,

    lineOptions: {
      styles: [
        {
          color: "red",
          opacity: 0.8,
          weight: 6
        }
      ]
    },

    show: true,

    addWaypoints: false,

    draggableWaypoints: false,

    fitSelectedRoutes: true

  }).addTo(map);
}

//////////////////////////////////////////////////////
// ボタン
//////////////////////////////////////////////////////

document.getElementById("routeBtn")
.addEventListener("click", () => {

  const startIndex = startSelect.value;
  const goalIndex = goalSelect.value;

  if (startIndex === "" || goalIndex === "") {
    alert("出発地と目的地を選択してください");
    return;
  }

  if (startIndex === goalIndex) {
    alert("同じ地点です");
    return;
  }

  const start = buildings[startIndex];
  const goal = buildings[goalIndex];

  createRoute(start.latlng, goal.latlng);
});

//////////////////////////////////////////////////////
// 現在地取得
//////////////////////////////////////////////////////

let currentLatLng = null;

document.getElementById("currentBtn")
.addEventListener("click", () => {

  map.locate({
    setView: true,
    maxZoom: 18
  });
});

map.on("locationfound", (e) => {

  currentLatLng = [e.latlng.lat, e.latlng.lng];

  L.circleMarker(currentLatLng, {
    radius: 8,
    color: "blue",
    fillColor: "#3388ff",
    fillOpacity: 0.8
  }).addTo(map);

  //alert("現在地を取得しました\n出発地として使用できます");

  // 現在地option追加
  let exist = false;

  for (let i = 0; i < startSelect.options.length; i++) {
    if (startSelect.options[i].value === "current") {
      exist = true;
    }
  }

  if (!exist) {
    const option = document.createElement("option");
    option.value = "current";
    option.textContent = "現在地";
    startSelect.prepend(option);
  }

  startSelect.value = "current";
});

map.on("locationerror", (e) => {
  alert("位置情報取得失敗: " + e.message);
});

let walkedPath = [];
let walkedLine = null;

map.locate({
  watch: true,
  enableHighAccuracy: true
});

map.on("locationfound", (e) => {

  const current = [
    e.latlng.lat,
    e.latlng.lng
  ];

  walkedPath.push(current);

  if (walkedLine) {
    map.removeLayer(walkedLine);
  }

  walkedLine = L.polyline(
    walkedPath,
    {
      color: "blue",
      weight: 5
    }
  ).addTo(map);

});

//////////////////////////////////////////////////////
// 出発地が現在地のとき
//////////////////////////////////////////////////////

document.getElementById("routeBtn")
.addEventListener("click", () => {

  const startIndex = startSelect.value;
  const goalIndex = goalSelect.value;

  if (goalIndex === "") {
    return;
  }

  const goal = buildings[goalIndex];

  if (startIndex === "current") {

    if (!currentLatLng) {
      alert("現在地を取得してください");
      return;
    }

    createRoute(currentLatLng, goal.latlng);
  }
});
